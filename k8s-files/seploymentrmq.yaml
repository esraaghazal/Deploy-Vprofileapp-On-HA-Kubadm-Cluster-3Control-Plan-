apiVersion: apps/v1
kind: Deployment

metadata:
  name: rmq01
  namespace: vprofile

spec:
  replicas: 1

  selector:
    matchLabels:
      app: rmq01

  template:

    metadata:
      labels:
        app: rmq01

    spec:
      enableServiceLinks: false

      containers:

      - name: rabbitmq

        image: rabbitmq:3.11-management-alpine

        env:

        - name: RABBITMQ_DEFAULT_USER
          value: test

        - name: RABBITMQ_DEFAULT_PASS
          value: test

        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"

        ports:

        - containerPort: 5672

        - containerPort: 15672