apiVersion: apps/v1
kind: Deployment

metadata:
  name: mc01
  namespace: vprofile

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mc01

  template:

    metadata:
      labels:
        app: mc01

    spec:

      containers:

      - name: memcached

        image: memcached:1.6-alpine

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

        args:
        - "-m"
        - "64"

        ports:
        - containerPort: 11211